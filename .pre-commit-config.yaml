repos:
  # Fast Python linter + formatter
  - repo: https://github.com/astral-sh/ruff-pre-commit
    # Pinned to the SAME version CI installs. When these drifted apart the hook
    # formatted with old rules, CI checked with new ones, and every push failed
    # a check that passed locally.
    rev: v0.15.5
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  # Security vulnerability scanner
  - repo: https://github.com/PyCQA/bandit
    rev: 1.7.8
    hooks:
      - id: bandit
        args: [-c, pyproject.toml]
        exclude: ^tests/

  # Secret / credential scanner
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.18.2
    hooks:
      - id: gitleaks

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: check-merge-conflict
      - id: trailing-whitespace
      - id: end-of-file-fixer
        exclude: \.(json|html)$
