name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

jobs:
  lint-and-scan:
    name: Lint, Security Scan, Import Check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install ruff bandit

      - name: Ruff lint
        run: ruff check .

      - name: Ruff format check
        run: ruff format --check .

      - name: Bandit security scan
        run: |
          bandit -r . \
            --exclude .venv,venv,tests \
            --severity-level medium \
            --confidence-level medium \
            -c pyproject.toml

      - name: Secret scan (gitleaks)
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Import check (smoke test)
        env:
          DELTA_API_KEY: "dummy"
          DELTA_API_SECRET: "dummy"
          CRYPTOFORGE_PIN: "test-pin-not-real"
        run: |
          python -c "
          import sys, os
          sys.path.insert(0, '.')
          os.environ.setdefault('DELTA_API_KEY', 'dummy')
          os.environ.setdefault('DELTA_API_SECRET', 'dummy')
          from engine.indicators import ema, rsi, macd, bollinger_bands, supertrend, adx
          from engine.backtest import run_backtest
          print('All imports OK')
          "
