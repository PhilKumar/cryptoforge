# ═══════════════════════════════════════════════════════════════
#  CryptoForge Nginx Config (Blue-Green zero-downtime deploy)
#
#  Upstream is defined in /etc/nginx/conf.d/cryptoforge-upstream.conf
#  and swapped automatically by cd-deploy.sh during deployments.
#
#  NOTE: This file handles CryptoForge ONLY.
#  PhilForge has its own nginx conf in the algoforge repo.
# ═══════════════════════════════════════════════════════════════

#  ── Upstream ────────────────────────────────────────────────────
#  THE LIVE UPSTREAM IS NOT DEFINED HERE. cd-deploy.sh writes
#      upstream cryptoforge_backend { server 127.0.0.1:<9000|9001>; }
#  to /etc/nginx/conf.d/cryptoforge-upstream.conf on every deploy, and that is
#  what every proxy_pass below resolves to.
#
#  The block underneath is unused — nothing references the `_default` name. It
#  must keep that distinct name: `upstream cryptoforge_backend` declared twice
#  is a duplicate, `nginx -t` fails, and the deploy aborts.
#
#  Its port previously read 8001, which this app has never run on. The ports are
#  9000 and 9001. Left corrected rather than deleted so the file still documents
#  the shape, but read the conf.d file for the truth.
upstream cryptoforge_backend_default {
    server 127.0.0.1:9000;
    keepalive 16;
    keepalive_requests 10000;
    keepalive_timeout 60s;
}

server {
    listen 80;
    server_name crypto.philforge.in;

    # ── TCP Latency Tuning ──────────────────────────────────
    tcp_nodelay on;
    tcp_nopush  on;

    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    add_header Cross-Origin-Opener-Policy "same-origin" always;
    add_header Cross-Origin-Resource-Policy "same-origin" always;
    add_header Content-Security-Policy "default-src 'self'; img-src 'self' data: https:; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com data:; script-src 'self' 'unsafe-inline'; connect-src 'self' ws: wss: https://crypto.philforge.in https://www.crypto.philforge.in; worker-src 'self'; manifest-src 'self'; object-src 'none'; frame-ancestors 'self'; base-uri 'self'; form-action 'self';" always;

    location = /sw.js {
        proxy_pass         http://cryptoforge_backend;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        add_header Cache-Control "no-store" always;
        expires -1;
    }

    location = /manifest.webmanifest {
        proxy_pass         http://cryptoforge_backend;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        add_header Cache-Control "no-store" always;
        expires -1;
    }

    location = /site.webmanifest {
        proxy_pass         http://cryptoforge_backend;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        add_header Cache-Control "no-store" always;
        expires -1;
    }

    location ^~ /static/ {
        proxy_pass         http://cryptoforge_backend;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        add_header Cache-Control "public, max-age=31536000, immutable" always;
    }

    # ── HOT PATH: Scalp execution (minimal overhead) ────────
    location /api/scalp/ {
        proxy_pass         http://cryptoforge_backend;
        proxy_http_version 1.1;
        proxy_set_header   Connection "";
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_buffering    off;
        proxy_request_buffering off;
        proxy_read_timeout 10s;
        proxy_send_timeout 10s;
        proxy_connect_timeout 2s;
    }

    # ── Backtests: genuinely long, so they keep the long timeout ──
    location /api/backtest {
        proxy_pass         http://cryptoforge_backend;
        proxy_http_version 1.1;
        proxy_set_header   Connection "";
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 600s;
        proxy_connect_timeout 60s;
        proxy_send_timeout 600s;
    }

    location /api/ {
        proxy_pass         http://cryptoforge_backend;
        proxy_http_version 1.1;
        proxy_set_header   Connection "";
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        # 30s, not 600s. The Cascade page polls /api/cascade/status every 3
        # seconds. At a 600s timeout a stalled backend does not fail requests,
        # it queues them: 600/3 is up to 200 in-flight requests per open tab,
        # each holding an nginx connection and a backend slot, none of them
        # ever giving up. That is how "the box is briefly slow" turned into
        # "the site is down" — the long timeout was the amplifier.
        # Backtests, the only thing here that legitimately runs for minutes,
        # keep 600s in their own block above.
        proxy_read_timeout 30s;
        proxy_connect_timeout 10s;
        proxy_send_timeout 30s;
    }

    location /ws {
        proxy_pass         http://cryptoforge_backend;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
        proxy_buffering    off;
    }

    location /health {
        proxy_pass http://cryptoforge_backend;
    }

    location / {
        proxy_pass         http://cryptoforge_backend;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }
}
