# ═══════════════════════════════════════════════════════════════
#  CryptoForge Nginx Config (Blue-Green zero-downtime deploy)
#
#  Upstream is defined in /etc/nginx/conf.d/cryptoforge-upstream.conf
#  and swapped automatically by cd-deploy.sh during deployments.
#
#  NOTE: This file handles CryptoForge ONLY.
#  AlgoForge has its own nginx conf in the algoforge repo.
# ═══════════════════════════════════════════════════════════════

upstream cryptoforge_backend_default {
    server 127.0.0.1:8001;
    keepalive 16;
    keepalive_requests 10000;
    keepalive_timeout 60s;
}

server {
    listen 80;
    server_name crypto.philforge.in;

    # ── TCP Latency Tuning ──────────────────────────────────
    tcp_nodelay on;
    tcp_nopush  on;

    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-Content-Type-Options "nosniff";

    # ── HOT PATH: Scalp execution (minimal overhead) ────────
    location /api/scalp/ {
        proxy_pass         http://cryptoforge_backend;
        proxy_http_version 1.1;
        proxy_set_header   Connection "";
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_buffering    off;
        proxy_request_buffering off;
        proxy_read_timeout 10s;
        proxy_send_timeout 10s;
        proxy_connect_timeout 2s;
    }

    location /api/ {
        proxy_pass         http://cryptoforge_backend;
        proxy_http_version 1.1;
        proxy_set_header   Connection "";
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 600s;
        proxy_connect_timeout 60s;
        proxy_send_timeout 600s;
    }

    location /ws {
        proxy_pass         http://cryptoforge_backend;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host $host;
        proxy_read_timeout 86400s;
    }

    location /health {
        proxy_pass http://cryptoforge_backend;
    }

    location / {
        proxy_pass         http://cryptoforge_backend;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }
}
