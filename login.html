<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<meta name="theme-color" content="#07090f">
<meta name="application-name" content="CryptoForge">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="apple-touch-icon" href="/apple-touch-icon.png?v=20260506-9">
<link rel="manifest" href="/manifest.webmanifest?v=20260506-9">
<title>CryptoForge — Unlock</title>
<script src="/static/cryptoforge-boot.js?v=20260506-9"></script>
<link href="https://fonts.googleapis.com/css2?family=Azeret+Mono:wght@400;500;600;700&family=Rajdhani:wght@500;600;700&family=Sora:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/static/cryptoforge-login.css?v=20260506-9">
<link rel="stylesheet" href="/static/cryptoforge-pwa.css?v=20260506-9">

</head>
<body>


<button type="button" class="login-appearance-toggle" id="login-appearance-toggle" aria-label="Appearance">
  <span class="login-appearance-dot"></span>
  <span>Style</span>
</button>
<div class="login-appearance-panel" id="login-appearance-panel" hidden>
  <div class="login-appearance-title">Appearance</div>
  <div class="login-appearance-label">Tint</div>
  <div class="login-appearance-grid">
    <button type="button" data-login-tint="aqua" class="swatch-aqua" aria-label="Aqua tint"></button>
    <button type="button" data-login-tint="gold" class="swatch-gold" aria-label="Gold tint"></button>
    <button type="button" data-login-tint="emerald" class="swatch-emerald" aria-label="Emerald tint"></button>
    <button type="button" data-login-tint="ruby" class="swatch-ruby" aria-label="Ruby tint"></button>
    <button type="button" data-login-tint="violet" class="swatch-violet" aria-label="Violet tint"></button>
  </div>
  <div class="login-appearance-label">Font</div>
  <div class="login-font-list">
    <button type="button" data-login-font="terminal">Terminal</button>
    <button type="button" data-login-font="institutional">Institutional</button>
    <button type="button" data-login-font="modern">Modern</button>
    <button type="button" data-login-font="quant">Quant</button>
    <button type="button" data-login-font="editorial">Serif</button>
  </div>
</div>

<div class="unlock-card" id="unlock-card">
  <div class="brand-icon">CF</div>
  <div class="unlock-title">CryptoForge</div>
  <div class="unlock-sub">Enter PIN to unlock</div>

  <div class="pin-dots" id="pin-dots">
    <div class="pin-dot" data-i="0"></div>
    <div class="pin-dot" data-i="1"></div>
    <div class="pin-dot" data-i="2"></div>
    <div class="pin-dot" data-i="3"></div>
    <div class="pin-dot" data-i="4"></div>
    <div class="pin-dot" data-i="5"></div>
  </div>

  <div class="unlock-status" id="unlock-status">Enter your 6-digit PIN</div>

  <div class="keypad" id="keypad">
    <button class="key" data-val="1">1</button>
    <button class="key" data-val="2">2</button>
    <button class="key" data-val="3">3</button>
    <button class="key" data-val="4">4</button>
    <button class="key" data-val="5">5</button>
    <button class="key" data-val="6">6</button>
    <button class="key" data-val="7">7</button>
    <button class="key" data-val="8">8</button>
    <button class="key" data-val="9">9</button>
    <button class="key fn" data-val="clear">&#x2715;</button>
    <button class="key" data-val="0">0</button>
    <button class="key fn" data-val="back">&#x232b;</button>
  </div>

  <div class="unlock-footer">Session-secured &middot; Auto-locks after 24h</div>
</div>

<script src="/static/cryptoforge-login.js?v=20260506-9" defer></script>
<script src="/static/pwa.js?v=20260506-9" defer></script>

</body>
</html>
